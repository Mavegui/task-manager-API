services:
  db:
    image: postgres:16-alpine3.23
    restart: unless-stopped
    container_name: task_manager_db_prod

    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    expose:
      - "5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: task_manager_nginx_prod

    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/usr/share/nginx/html/static:ro

    depends_on:
      - web

  web:
    image: mavegui/task_manager_api:latest
    container_name: task_manager_api_prod

    restart: unless-stopped

    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4

    expose:
      - "8000"

    env_file:
      - .env
    
    volumes:
      - static_volume:/app/staticfiles

    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data_prod:
  static_volume:

# Executar: docker compose -f docker-compose.prod.yml up -d
# Parar: docker compose -f docker-compose.prod.yml down